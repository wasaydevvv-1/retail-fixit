server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy REST API to the deployed Container App (Azure).
  # For local docker-compose, use nginx.compose.conf instead.
  location /api/ {
    proxy_pass https://retailfixitapi.happybeach-c0571a03.centralus.azurecontainerapps.io/api/;
    proxy_ssl_server_name on;
    proxy_set_header Host retailfixitapi.happybeach-c0571a03.centralus.azurecontainerapps.io;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
